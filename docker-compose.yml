services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cheshara_backend

    command: >
      sh -c "
      python manage.py migrate &&
      gunicorn cheshara_config.wsgi:application
      --bind 0.0.0.0:8005
      --workers 3
      --threads 2
      --timeout 120
      "

    volumes:
      - .:/app

    ports:
      - "8005:8005"

    env_file:
      - .env

    restart: always

